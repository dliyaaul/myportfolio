name: portofolio
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  animated_text_kit: ^4.3.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  font_awesome_flutter: ^11.0.0
  glassmorphism: ^3.0.0
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  visibility_detector: ^0.4.0+2
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/project/
    - assets/project/fleet/
    - assets/project/pomodoro/
    - assets/project/absensi/
